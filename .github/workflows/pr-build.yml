name: PR Build

permissions:
  contents: write
  pull-requests: write

on:
  pull_request:
    branches:
      - main
      - development

jobs:
  build:
    name: Build (${{ matrix.platform }}-${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: arm64
          - os: macos-26
            platform: macos
            arch: x64
          - os: macos-26
            platform: macos
            arch: arm64
          - os: windows-latest
            platform: windows
            arch: x64
          - os: windows-latest
            platform: windows
            arch: arm64
    outputs:
      sha: ${{ steps.info.outputs.sha }}
    steps:
      - name: Get build info
        id: info
        shell: bash
        run: |
          pr_number="${GITHUB_REF#refs/pull/}"
          pr_number="${pr_number%/merge}"
          echo "version=pr-${pr_number}" >> $GITHUB_OUTPUT
          echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install OS-specific Dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-dev

      - name: Install OS-specific Dependencies (macOS)
        if: matrix.platform == 'macos'
        run: brew install python-setuptools

      - name: Install OS-specific Dependencies (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: npm install --global node-gyp

      - name: Run Build Script (Linux)
        if: matrix.platform == 'linux'
        env:
          PR_VERSION: ${{ steps.info.outputs.version }}
          BUILD_ARCH: ${{ matrix.arch }}
        run: |
          chmod +x electron/release-scripts/linux-dev.sh
          electron/release-scripts/linux-dev.sh "$PR_VERSION" "$GITHUB_WORKSPACE/release_artifacts/linux/$PR_VERSION" "$BUILD_ARCH"

      - name: Run Build Script (macOS)
        if: matrix.platform == 'macos'
        env:
          PR_VERSION: ${{ steps.info.outputs.version }}
          BUILD_ARCH: ${{ matrix.arch }}
        run: |
          chmod +x electron/release-scripts/macos-dev.sh
          electron/release-scripts/macos-dev.sh "$PR_VERSION" "$GITHUB_WORKSPACE/release_artifacts/macos/$PR_VERSION" "$BUILD_ARCH"

      - name: Run Build Script (Windows)
        if: matrix.platform == 'windows'
        env:
          PR_VERSION: ${{ steps.info.outputs.version }}
          BUILD_ARCH: ${{ matrix.arch }}
        shell: pwsh
        run: |
          .\electron\release-scripts\windows-dev.ps1 -ReleaseVersion "$env:PR_VERSION" -ReleasePath "$env:GITHUB_WORKSPACE\release_artifacts\windows\$env:PR_VERSION" -Arch "$env:BUILD_ARCH"

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Horizon-PR${{ github.event.pull_request.number }}-${{ steps.info.outputs.sha }}-${{ matrix.platform }}-${{ matrix.arch }}
          path: release_artifacts/**
          retention-days: 14

  link:
    name: Post Download Links
    needs: build
    runs-on: ubuntu-latest
    if: always() && needs.build.result == 'success'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: beni69/artifact-link@v1
        with:
          token: ${{ github.token }}
          group: '(?<row>[a-z]+)-(?<col>[a-z0-9]+)$'
